<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#020617,#0f172a,#020617);
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .box{
      padding:40px;
      border-radius:20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow:0 8px 30px rgba(0,0,0,0.5);
    }

    a{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#38bdf8;
      color:black;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
      font-weight:bold;
    }

    a:hover{
      transform:scale(1.1);
      background:#0ea5e9;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Welcome 🚀</h1>
    <p>Click below to open the Calendar</p>

    <a href="main.html">Open Calendar</a>
  </div>

</body>
</html>
